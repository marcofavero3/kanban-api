spring.application.name=kanban-api

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/kanban_db
spring.datasource.username=kanban_user
spring.datasource.password=kanban_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App
server.port=8080

# JWT
jwt.secret=3f8a2b1c9e7d4f6a0b5c8e2d1a9f3b7c4e6d0a2f5b8c1e4d7a0f3b6c9e2d5a8f
jwt.expiration=900000
jwt.refresh-expiration=604800000